<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#0f766e" />
    <title>Página no encontrada | Alan Carlos Hernández</title>
    <style>
      :root {
        --ink: #182024;
        --text: #374249;
        --muted: #66727a;
        --line: #e1e9ed;
        --accent: #0f766e;
        --accent-dark: #0b5f59;
        --white: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        background: #fcfdfd;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
        place-items: center;
      }

      main {
        width: min(620px, calc(100% - 40px));
        padding: 48px 0;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent-dark);
        font-size: 0.74rem;
        font-weight: 850;
        letter-spacing: 0.11em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2.4rem, 8vw, 4.6rem);
        line-height: 0.98;
        letter-spacing: 0;
      }

      p {
        max-width: 560px;
        margin: 0;
        color: var(--text);
        font-size: 1.05rem;
        line-height: 1.68;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        margin-top: 30px;
        padding: 0 20px;
        color: var(--white);
        background: var(--accent);
        border: 1px solid var(--accent);
        border-radius: 8px;
        font-weight: 800;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 3px solid var(--accent);
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">404</p>
      <h1>Página no encontrada</h1>
      <p>
        La ruta que abriste no existe en este portafolio. Puedes volver al inicio
        para ver proyectos, case studies, CV y contacto.
      </p>
      <a href="/alan-portfolio/">Volver al inicio</a>
    </main>
  </body>
</html>
